services:
  postgres:
    image: postgres:16-alpine
    container_name: analytics-reporting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics_reporting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics_reporting"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
